<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Multimedia</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-lg p-8">

        <h1 class="text-4xl font-bold text-gray-900 mb-2">
            Galería Multimedia
        </h1>

        <p class="text-gray-500 mb-8">
            Gestión de imágenes y audios almacenados en MongoDB Atlas.
        </p>

        <form action="/api/multimedia" method="POST" enctype="multipart/form-data" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Título
                </label>

                <input type="text" name="titulo" required
                    class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Descripción
                </label>

                <textarea name="descripcion" rows="4"
                    class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Imagen
                </label>

                <input type="file" name="imagen" accept="image/*" required
                    class="w-full text-gray-600">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Audio
                </label>

                <input type="file" name="audio" accept="audio/*" required
                    class="w-full text-gray-600">
            </div>

            <button type="submit"
                class="w-full bg-black text-white py-3 rounded-xl hover:bg-gray-800 transition">
                Guardar
            </button>

        </form>

    </div>

</body>

</html>
