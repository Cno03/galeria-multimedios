<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Multimedia</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-5xl mx-auto">

        <div class="bg-white rounded-3xl shadow-lg p-8">

            <h1 class="text-4xl font-bold text-gray-900 mb-2">
                Galería Multimedia
            </h1>

            <p class="text-gray-500 mb-8">
                Gestión de imágenes y audios almacenados en MongoDB Atlas.
            </p>

            <form id="formulario" enctype="multipart/form-data" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Título
                    </label>

                    <input
                        type="text"
                        name="titulo"
                        required
                        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Descripción
                    </label>

                    <textarea
                        name="descripcion"
                        rows="4"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Imagen
                    </label>

                    <input
                        type="file"
                        name="imagen"
                        accept="image/*"
                        required
                        class="w-full text-gray-600">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Audio
                    </label>

                    <input
                        type="file"
                        name="audio"
                        accept="audio/*"
                        required
                        class="w-full text-gray-600">
                </div>

                <button
                    type="submit"
                    class="w-full bg-black text-white py-3 rounded-xl hover:bg-gray-800 transition">
                    Guardar
                </button>

            </form>

        </div>

        <div id="galeria" class="mt-10 space-y-5"></div>

    </div>

    <script>

        const formulario = document.getElementById('formulario');

        formulario.addEventListener('submit', async (e) => {

            e.preventDefault();

            const formData = new FormData(formulario);

            try {

                await fetch('/api/multimedia', {
                    method: 'POST',
                    body: formData
                });

                formulario.reset();

                cargarElementos();

            } catch (error) {

                console.error(error);
                alert('Error al guardar');

            }

        });

        async function eliminar(id) {

            if (!confirm('¿Deseas eliminar este elemento?')) return;

            try {

                await fetch('/api/multimedia/' + id, {
                    method: 'DELETE'
                });

                cargarElementos();

            } catch (error) {

                console.error(error);
                alert('Error al eliminar');

            }

        }

        async function editar(id, tituloActual, descripcionActual) {

            const nuevoTitulo = prompt('Nuevo título:', tituloActual);

            if (nuevoTitulo === null) return;

            const nuevaDescripcion = prompt(
                'Nueva descripción:',
                descripcionActual
            );

            if (nuevaDescripcion === null) return;

            try {

                await fetch('/api/multimedia/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        titulo: nuevoTitulo,
                        descripcion: nuevaDescripcion
                    })
                });

                cargarElementos();

            } catch (error) {

                console.error(error);
                alert('Error al editar');

            }

        }

        async function cargarElementos() {

            try {

                const respuesta = await fetch('/api/multimedia');

                const datos = await respuesta.json();

                const galeria = document.getElementById('galeria');

                galeria.innerHTML = '';

                datos.reverse().forEach(item => {

                    galeria.innerHTML += `
                    
                    <div class="bg-gray-200 rounded-3xl p-5 flex gap-6 shadow">

                        <img
                            src="${item.imagenUrl}"
                            class="w-40 h-40 object-cover rounded-2xl">

                        <div class="flex-1">

                            <h2 class="text-2xl font-bold mb-2">
                                ${item.titulo}
                            </h2>

                            <p class="text-gray-700 mb-4">
                                ${item.descripcion || ''}
                            </p>

                            <audio controls class="w-full mb-4">
                                <source src="${item.audioUrl}">
                            </audio>

                            <div class="flex gap-3">

                                <button
                                    onclick="editar(
                                        '${item._id}',
                                        \`${item.titulo}\`,
                                        \`${item.descripcion || ''}\`
                                    )"
                                    class="bg-black text-white px-5 py-2 rounded-xl hover:bg-gray-800">

                                    Editar

                                </button>

                                <button
                                    onclick="eliminar('${item._id}')"
                                    class="bg-red-500 text-white px-5 py-2 rounded-xl hover:bg-red-600">

                                    Eliminar

                                </button>

                            </div>

                        </div>

                    </div>

                    `;

                });

            } catch (error) {

                console.error(error);

            }

        }

        cargarElementos();

    </script>

</body>

</html>
